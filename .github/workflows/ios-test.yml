name: (Test)Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ios-ipa:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build iOS IPA (release, no codesign)
        run: |
          cd apps/mobile
          flutter build ipa --release --no-codesign


      - name: Upload iOS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-artifacts
          if-no-files-found: warn
          retention-days: 14
          path: |
            apps/mobile/build/ios/ipa/*.ipa
            apps/mobile/build/ios/archive/*.xcarchive
            apps/mobile/build/ios/**/*.xcarchive
